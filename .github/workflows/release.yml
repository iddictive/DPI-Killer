name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build App
        run: |
          bash build.sh

      - name: Create DMG
        run: |
          bash scripts/create_dmg.sh

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: DPIKiller.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
